<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bybit Balance Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-card: #161b22;
            --bg-input: #0d1117;
            --border-color: #30363d;
            --primary: #58a6ff;
            --primary-hover: #79b8ff;
            --success: #3fb950;
            --danger: #f85149;
            --warning: #d29922;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, #a371f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        .btn-secondary:hover {
            background: #1f2937;
            border-color: var(--text-muted);
        }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border-color: var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: #fff;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .grid {
            display: grid;
            gap: 24px;
        }

        .grid-2 {
            grid-template-columns: 1fr 1fr;
        }

        .grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }

        #individual-charts .card {
            margin-top: 24px;
        }
            padding: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            font-size: 14px;
        }

        tr:hover td {
            background: rgba(88, 166, 255, 0.05);
        }

        .coin-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            background: rgba(88, 166, 255, 0.1);
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--primary);
            font-weight: 500;
        }

        .balance-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }

        .balance-positive {
            color: var(--success);
        }

        .balance-negative {
            color: var(--danger);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-up {
            background: rgba(63, 185, 80, 0.15);
            color: var(--success);
        }

        .status-down {
            background: rgba(248, 81, 73, 0.15);
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 16px;
            margin-bottom: 24px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            transform: translateY(20px);
            transition: transform 0.2s ease;
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-header {
            margin-bottom: 24px;
        }

        .modal-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            transition: border-color 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            cursor: pointer;
        }

        .form-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .modal-actions .btn {
            flex: 1;
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: var(--bg-card);
            padding: 4px;
            border-radius: 10px;
            width: fit-content;
        }

        .tab {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            color: var(--text-secondary);
            border: none;
        }

        .tab.active {
            background: var(--primary);
            color: #000;
        }

        .tab:hover:not(.active) {
            color: var(--text-primary);
            background: rgba(88, 166, 255, 0.1);
        }

        .period-selector {
            display: flex;
            gap: 8px;
        }

        .period-btn {
            padding: 6px 14px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .period-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #000;
        }

        .period-btn:hover:not(.active) {
            border-color: var(--text-muted);
            color: var(--text-primary);
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            z-index: 1100;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: var(--success);
            color: var(--success);
        }

        .toast.error {
            border-color: var(--danger);
            color: var(--danger);
        }

        .account-actions {
            display: flex;
            gap: 8px;
        }

        .history-group {
            margin-bottom: 24px;
        }

        .history-group-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .history-group-header:hover {
            background: rgba(88, 166, 255, 0.15);
        }

        .history-group-header .account-name {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: var(--primary);
        }

        .history-group-header .record-count {
            font-size: 12px;
            color: var(--text-muted);
        }

        .history-group-toggle {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: transform 0.2s ease;
        }

        .history-group .history-group-toggle {
            transform: rotate(-90deg);
        }

        .history-group:not(.collapsed) .history-group-toggle {
            transform: rotate(0deg);
        }

        .history-group-content {
            border: 1px solid var(--border-color);
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 800px;
            overflow-y: auto;
        }

        .history-group.collapsed .history-group-content {
            display: none;
        }

        .history-group table {
            margin: 0;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            border-color: var(--text-muted);
            color: var(--text-primary);
        }

        .icon-btn.danger:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .icon-btn.sync:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .validate-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            margin-top: 8px;
        }

        .validate-status.valid {
            color: var(--success);
        }

        .validate-status.invalid {
            color: var(--danger);
        }

        .validate-status-icon {
            width: 16px;
            height: 16px;
        }

        @media (max-width: 1024px) {
            .grid-2, .grid-3 {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }

            header {
                flex-direction: column;
                gap: 16px;
            }

            .header-actions {
                width: 100%;
                flex-direction: column;
            }

            .header-actions .btn {
                width: 100%;
            }

            h1 {
                font-size: 22px;
            }

            .tabs {
                flex-direction: column;
                gap: 4px;
            }

            .tab {
                width: 100%;
                text-align: center;
                border-radius: 8px;
            }

            .tab.active {
                border-radius: 8px;
            }

            .card {
                padding: 12px;
            }

            .card-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .form-row {
                flex-direction: column;
            }

            .modal {
                width: calc(100% - 24px);
                margin: 12px;
                padding: 16px;
            }

            .period-selector {
                flex-wrap: wrap;
            }

            .period-btn {
                flex: 1;
                min-width: 60px;
            }

            .history-group-header {
                flex-wrap: wrap;
            }

            .account-actions {
                flex-direction: column;
            }

            .account-actions .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Bybit Balance Monitor</h1>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="syncAllBalances()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                    Синхронизировать
                </button>
                <button class="btn btn-primary" onclick="openAddModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Добавить аккаунт
                </button>
            </div>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('balances')">Балансы</button>
            <button class="tab" onclick="switchTab('services')">Сервисы</button>
            <button class="tab" onclick="switchTab('chart')">График</button>
            <button class="tab" onclick="switchTab('history')">История</button>
        </div>

        <div id="balances-tab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Текущие балансы</h2>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Аккаунт</th>
                                <th>Монета</th>
                                <th>Баланс</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="balances-table">
                            <tr>
                                <td colspan="4">
                                    <div class="loading">
                                        <div class="spinner"></div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="services-tab" class="tab-content" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Мониторинг сервисов</h2>
                    <button class="btn btn-primary btn-sm" onclick="openAddServiceModal()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        Добавить сервис
                    </button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Название</th>
                                <th>URL</th>
                                <th>Статус</th>
                                <th>Последняя проверка</th>
                                <th>Время отклика</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="services-table">
                            <tr>
                                <td colspan="6">
                                    <div class="loading">
                                        <div class="spinner"></div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="chart-tab" class="tab-content" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Общий баланс</h2>
                    <div class="period-selector">
                        <button class="period-btn active" onclick="setPeriod('24h')">24ч</button>
                        <button class="period-btn" onclick="setPeriod('7d')">7д</button>
                        <button class="period-btn" onclick="setPeriod('30d')">30д</button>
                        <button class="period-btn" onclick="setPeriod('all')">Всё</button>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="balanceChart"></canvas>
                </div>
            </div>
            <div id="individual-charts"></div>
        </div>

        <div id="history-tab" class="tab-content" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">История изменений</h2>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Дата</th>
                                <th>Аккаунт</th>
                                <th>Монета</th>
                                <th>Баланс</th>
                            </tr>
                        </thead>
                        <tbody id="history-table">
                            <tr>
                                <td colspan="4">
                                    <div class="loading">
                                        <div class="spinner"></div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="add-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Добавить аккаунт</h3>
            </div>
            <form id="add-account-form" onsubmit="addAccount(event)">
                <div class="form-group">
                    <label class="form-label">Название аккаунта</label>
                    <input type="text" class="form-input" name="name" placeholder="Например: Main Account" required>
                </div>
                <div class="form-group">
                    <label class="form-label">API Key</label>
                    <input type="text" class="form-input" name="api_key" placeholder="Введите API ключ Bybit" required>
                </div>
                <div class="form-group">
                    <label class="form-label">API Secret</label>
                    <input type="password" class="form-input" name="api_secret" placeholder="Введите API секрет" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Тип аккаунта</label>
                    <select class="form-select" name="account_type">
                        <option value="UNIFIED">Unified (UTA)</option>
                        <option value="CONTRACT">Contract</option>
                        <option value="SPOT">Spot</option>
                    </select>
                </div>
                <div class="form-group">
                    <button type="button" class="btn btn-secondary" onclick="validateApiKey()">
                        Проверить ключ
                    </button>
                    <div id="validate-status"></div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeAddModal()">Отмена</button>
                    <button type="submit" class="btn btn-primary">Добавить</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="add-service-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Добавить сервис</h3>
            </div>
            <form id="add-service-form" onsubmit="addService(event)">
                <div class="form-group">
                    <label class="form-label">Название сервиса</label>
                    <input type="text" class="form-input" name="name" placeholder="Например: Trade API" required>
                </div>
                <div class="form-group">
                    <label class="form-label">URL для проверки</label>
                    <input type="url" class="form-input" name="url" placeholder="https://example.com/health" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Ожидаемый статус</label>
                    <input type="number" class="form-input" name="expected_status" value="200" min="100" max="599">
                </div>
                <div class="form-group">
                    <label class="form-label">Интервал проверки (секунды)</label>
                    <input type="number" class="form-input" name="check_interval" value="60" min="10">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeAddServiceModal()">Отмена</button>
                    <button type="submit" class="btn btn-primary">Добавить</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const basePath = '/monitor';
        let balanceChart = null;
        let individualCharts = {};
        let currentPeriod = '24h';

        let isInitialLoad = true;

        document.addEventListener('DOMContentLoaded', function() {
            loadBalances();
        });

        async function loadBalances(showLoading = false) {
            const tbody = document.getElementById('balances-table');
            
            if (showLoading || isInitialLoad) {
                tbody.innerHTML = '<tr><td colspan="4"><div class="loading"><div class="spinner"></div></div></td></tr>';
                isInitialLoad = false;
            }

            try {
                const response = await fetch(basePath + '/api/balances');
                const data = await response.json();

                if (data.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="4">
                                <div class="empty-state">
                                    <div class="empty-state-icon">📊</div>
                                    <p class="empty-state-text">Нет добавленных аккаунтов</p>
                                    <button class="btn btn-primary" onclick="openAddModal()">Добавить аккаунт</button>
                                </div>
                            </td>
                        </tr>
                    `;
                    return;
                }

                let html = '';
                data.forEach(account => {
                    if (account.balances.length === 0) {
                        html += `
                            <tr>
                                <td>${account.accountName}</td>
                                <td colspan="2" style="color: var(--text-muted);">Нет баланса</td>
                                <td>
                                    <div class="account-actions">
                                        <button class="icon-btn sync" onclick="syncAccount(${account.accountId})" title="Синхронизировать">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M23 4v6h-6M1 20v-6h6"/>
                                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                                            </svg>
                                        </button>
                                        <button class="icon-btn danger" onclick="deleteAccount(${account.accountId})" title="Удалить">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                            </svg>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    } else {
                        account.balances.forEach((balance, index) => {
                            html += `
                                <tr>
                                    ${index === 0 ? `<td rowspan="${account.balances.length}">${account.accountName}</td>` : ''}
                                    <td><span class="coin-badge">${balance.coin}</span></td>
                                    <td class="balance-value balance-positive">${balance.balance.toFixed(4)}</td>
                                    ${index === 0 ? `<td rowspan="${account.balances.length}">
                                        <div class="account-actions">
                                            <button class="icon-btn sync" onclick="syncAccount(${account.accountId})" title="Синхронизировать">
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                    <path d="M23 4v6h-6M1 20v-6h6"/>
                                                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                                                </svg>
                                            </button>
                                            <button class="icon-btn danger" onclick="deleteAccount(${account.accountId})" title="Удалить">
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                    <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                                </svg>
                                            </button>
                                        </div>
                                    </td>` : ''}
                                </tr>
                            `;
                        });
                    }
                });

                tbody.innerHTML = html;
            } catch (error) {
                console.error('Error loading balances:', error);
                showToast('Ошибка загрузки балансов', 'error');
            }
        }

        let servicesInitialLoad = true;

        async function loadServices(showLoading = false) {
            const tbody = document.getElementById('services-table');
            
            if (showLoading || servicesInitialLoad) {
                tbody.innerHTML = '<tr><td colspan="6"><div class="loading"><div class="spinner"></div></div></td></tr>';
                servicesInitialLoad = false;
            }

            try {
                const response = await fetch(basePath + '/api/services');
                const data = await response.json();

                if (data.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6">
                                <div class="empty-state">
                                    <div class="empty-state-icon">🖥️</div>
                                    <p class="empty-state-text">Нет мониторинговых сервисов</p>
                                    <button class="btn btn-primary" onclick="openAddServiceModal()">Добавить сервис</button>
                                </div>
                            </td>
                        </tr>
                    `;
                    return;
                }

                let html = '';
                for (const service of data) {
                    const isUp = service.last_status === service.expected_status;
                    const statusClass = isUp ? 'status-up' : 'status-down';
                    const statusText = isUp ? 'Онлайн' : 'Офлайн';

                    const lastCheck = service.last_check_at
                        ? new Date(service.last_check_at).toLocaleString('ru-RU')
                        : 'Никогда';

                    html += `
                        <tr>
                            <td><strong>${service.name}</strong></td>
                            <td><code style="font-size: 12px; color: var(--text-secondary);">${service.url}</code></td>
                            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                            <td>${lastCheck}</td>
                            <td>${service.last_status !== null ? '—' : '—'}</td>
                            <td>
                                <div class="account-actions">
                                    <button class="icon-btn danger" onclick="deleteService(${service.id})" title="Удалить">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                        </svg>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                }

                tbody.innerHTML = html;

                setTimeout(loadServices, 5000);
            } catch (error) {
                console.error('Error loading services:', error);
                showToast('Ошибка загрузки сервисов', 'error');
            }
        }

        async function loadHistory() {
            const tbody = document.getElementById('history-table');
            tbody.innerHTML = '<tr><td colspan="4"><div class="loading"><div class="spinner"></div></div></td></tr>';

            try {
                const response = await fetch(basePath + '/api/history/all?limit=50');
                const data = await response.json();

                if (data.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="4">
                                <div class="empty-state">
                                    <div class="empty-state-icon">📜</div>
                                    <p class="empty-state-text">Нет данных истории</p>
                                </div>
                            </td>
                        </tr>
                    `;
                    return;
                }

                // Group by account name
                const grouped = {};
                data.forEach(item => {
                    if (!grouped[item.accountName]) {
                        grouped[item.accountName] = [];
                    }
                    grouped[item.accountName].push(item);
                });

                const html = Object.entries(grouped).map(([accountName, items]) => {
                    const itemsHtml = items.map(item => {
                        const date = new Date(item.recordedAt);
                        const dateStr = date.toLocaleDateString('ru-RU', { month: 'short', day: 'numeric' });
                        const timeStr = date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

                        return `
                            <tr>
                                <td>${dateStr} ${timeStr}</td>
                                <td><span class="coin-badge">${item.coin}</span></td>
                                <td class="balance-value">${item.balance.toFixed(4)}</td>
                            </tr>
                        `;
                    }).join('');

                    return `
                        <div class="history-group collapsed" data-account="${accountName}">
                            <div class="history-group-header" onclick="toggleHistoryGroup('${accountName}')">
                                <div class="history-group-toggle">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="6 9 12 15 18 9"></polyline>
                                    </svg>
                                </div>
                                <span class="account-name">${accountName}</span>
                                <span class="record-count">${items.length} записей</span>
                            </div>
                            <div class="history-group-content">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Дата</th>
                                            <th>Монета</th>
                                            <th>Баланс</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${itemsHtml}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    `;
                }).join('');

                tbody.innerHTML = `<tr><td colspan="4">${html}</td></tr>`;
            } catch (error) {
                console.error('Error loading history:', error);
                showToast('Ошибка загрузки истории', 'error');
            }
        }

        function toggleHistoryGroup(accountName) {
            const group = document.querySelector(`.history-group[data-account="${accountName}"]`);
            if (group) {
                group.classList.toggle('collapsed');
            }
        }

        window.toggleHistoryGroup = toggleHistoryGroup;

        async function loadChart() {
            try {
                const response = await fetch(basePath + `/api/history/chart?period=${currentPeriod}`);
                const data = await response.json();

                const ctx = document.getElementById('balanceChart').getContext('2d');

                if (balanceChart) {
                    balanceChart.destroy();
                }

                if (!data.accounts || data.accounts.length === 0) {
                    return;
                }

                const labels = data.timestamps.map((ts) => {
                    const date = new Date(ts);
                    return date.toLocaleDateString('ru-RU', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                });

                // Generate distinct colors for each account
                const colors = [
                    '#58a6ff', '#3fb950', '#f85149', '#d29922', '#a371f7',
                    '#79c0ff', '#56d364', '#ff7b72', '#e3b341', '#bc8cff'
                ];

                const datasets = data.accounts.map((accountName, index) => ({
                    label: accountName,
                    data: data.timestamps.map((ts) => data.data[ts]?.[accountName] || 0),
                    borderColor: colors[index % colors.length],
                    backgroundColor: colors[index % colors.length] + '15',
                    fill: false,
                    tension: 0.4,
                    pointRadius: 2,
                    pointHoverRadius: 6,
                }));

                balanceChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: datasets
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top',
                                labels: {
                                    color: '#c9d1d9',
                                    usePointStyle: true,
                                    padding: 20
                                }
                            },
                            tooltip: {
                                backgroundColor: '#161b22',
                                titleColor: '#c9d1d9',
                                bodyColor: '#c9d1d9',
                                borderColor: '#30363d',
                                borderWidth: 1,
                                padding: 12,
                                displayColors: true,
                                callbacks: {
                                    label: function(context) {
                                        return context.parsed.y.toFixed(4);
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: {
                                    color: '#30363d',
                                    drawBorder: false
                                },
                                ticks: {
                                    color: '#8b949e',
                                    maxTicksLimit: 8
                                }
                            },
                            y: {
                                grid: {
                                    color: '#30363d',
                                    drawBorder: false
                                },
                                ticks: {
                                    color: '#8b949e'
                                }
                            }
                        }
                    }
                });

                // Render individual charts for each account
                const container = document.getElementById('individual-charts');
                container.innerHTML = '';

                if (data.accountData) {
                    const individualColors = [
                        '#58a6ff', '#3fb950', '#f85149', '#d29922', '#a371f7',
                        '#79c0ff', '#56d364', '#ff7b72', '#e3b341', '#bc8cff'
                    ];

                    data.accounts.forEach((accountName, index) => {
                        const accData = data.accountData[accountName];
                        if (!accData || accData.balances.length === 0) return;

                        // Create card for each account
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="card-header">
                                <h2 class="card-title">${accountName}</h2>
                            </div>
                            <div class="chart-container">
                                <canvas id="chart-${accountName.replace(/[^a-zA-Z0-9]/g, '-')}"></canvas>
                            </div>
                        `;
                        container.appendChild(card);

                        const accCtx = card.querySelector('canvas').getContext('2d');
                        const accLabels = accData.timestamps.map(ts => {
                            const date = new Date(ts);
                            return date.toLocaleDateString('ru-RU', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                        });

                        // Destroy previous chart if exists
                        if (individualCharts[accountName]) {
                            individualCharts[accountName].destroy();
                        }

                        individualCharts[accountName] = new Chart(accCtx, {
                            type: 'line',
                            data: {
                                labels: accLabels,
                                datasets: [{
                                    label: accountName,
                                    data: accData.balances,
                                    borderColor: individualColors[index % individualColors.length],
                                    backgroundColor: individualColors[index % individualColors.length] + '15',
                                    fill: true,
                                    tension: 0.4,
                                    pointRadius: 2,
                                    pointHoverRadius: 6,
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: {
                                        display: false
                                    },
                                    tooltip: {
                                        backgroundColor: '#161b22',
                                        titleColor: '#c9d1d9',
                                        bodyColor: '#c9d1d9',
                                        borderColor: '#30363d',
                                        borderWidth: 1,
                                        padding: 12,
                                        callbacks: {
                                            label: function(context) {
                                                return context.parsed.y.toFixed(4);
                                            }
                                        }
                                    }
                                },
                                scales: {
                                    x: {
                                        grid: {
                                            color: '#30363d',
                                            drawBorder: false
                                        },
                                        ticks: {
                                            color: '#8b949e',
                                            maxTicksLimit: 8
                                        }
                                    },
                                    y: {
                                        grid: {
                                            color: '#30363d',
                                            drawBorder: false
                                        },
                                        ticks: {
                                            color: '#8b949e'
                                        }
                                    }
                                }
                            }
                        });
                    });
                }
            } catch (error) {
                console.error('Error loading chart:', error);
            }
        }

        function setPeriod(period) {
            currentPeriod = period;
            document.querySelectorAll('.period-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadChart();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');

            const tabIndex = ['balances', 'services', 'chart', 'history'].indexOf(tab);
            document.querySelectorAll('.tab')[tabIndex].classList.add('active');
            document.getElementById(`${tab}-tab`).style.display = 'block';

            if (tab === 'balances') loadBalances(false);
            if (tab === 'services') loadServices(false);
            if (tab === 'chart') loadChart();
            if (tab === 'history') loadHistory();
        }

        function openAddModal() {
            document.getElementById('add-modal').classList.add('active');
            document.getElementById('validate-status').innerHTML = '';
        }

        function closeAddModal() {
            document.getElementById('add-modal').classList.remove('active');
            document.getElementById('add-account-form').reset();
        }

        async function validateApiKey() {
            const form = document.getElementById('add-account-form');
            const apiKey = form.api_key.value;
            const apiSecret = form.api_secret.value;
            const accountType = form.account_type.value;

            if (!apiKey || !apiSecret) {
                showToast('Введите API ключ и секрет', 'error');
                return;
            }

            const statusDiv = document.getElementById('validate-status');
            statusDiv.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            try {
                const response = await fetch(basePath + '/api/accounts/validate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_key: apiKey, api_secret: apiSecret, account_type: accountType })
                });
                const data = await response.json();

                if (data.valid) {
                    statusDiv.innerHTML = '<div class="validate-status valid">✓ Ключ валиден</div>';
                } else {
                    statusDiv.innerHTML = '<div class="validate-status invalid">✗ Неверный ключ</div>';
                }
            } catch (error) {
                statusDiv.innerHTML = '<div class="validate-status invalid">✗ Ошибка проверки</div>';
            }
        }

        async function addAccount(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);

            try {
                const response = await fetch(basePath + '/api/accounts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: formData.get('name'),
                        api_key: formData.get('api_key'),
                        api_secret: formData.get('api_secret'),
                        account_type: formData.get('account_type')
                    })
                });

                if (response.ok) {
                    showToast('Аккаунт добавлен', 'success');
                    closeAddModal();
                    loadBalances(false);
                } else {
                    const error = await response.json();
                    showToast(error.error || 'Ошибка добавления', 'error');
                }
            } catch (error) {
                showToast('Ошибка добавления аккаунта', 'error');
            }
        }

        async function deleteAccount(id) {
            if (!confirm('Вы уверены, что хотите удалить этот аккаунт?')) return;

            try {
                const response = await fetch(basePath + `/api/accounts/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast('Аккаунт удалён', 'success');
                    loadBalances(false);
                } else {
                    showToast('Ошибка удаления', 'error');
                }
            } catch (error) {
                showToast('Ошибка удаления аккаунта', 'error');
            }
        }

        async function syncAccount(id) {
            try {
                const response = await fetch(basePath + `/api/balances/sync/${id}`, { method: 'POST' });
                if (response.ok) {
                    showToast('Баланс синхронизирован', 'success');
                    loadBalances(false);
                } else {
                    showToast('Ошибка синхронизации', 'error');
                }
            } catch (error) {
                showToast('Ошибка синхронизации', 'error');
            }
        }

        async function syncAllBalances() {
            showToast('Синхронизация...', 'success');
            await loadBalances(false);
            showToast('Синхронизация завершена', 'success');
        }

        function openAddServiceModal() {
            document.getElementById('add-service-modal').classList.add('active');
        }

        function closeAddServiceModal() {
            document.getElementById('add-service-modal').classList.remove('active');
            document.getElementById('add-service-form').reset();
        }

        async function addService(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);

            try {
                const response = await fetch(basePath + '/api/services', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: formData.get('name'),
                        url: formData.get('url'),
                        expected_status: parseInt(formData.get('expected_status')),
                        check_interval: parseInt(formData.get('check_interval'))
                    })
                });

                if (response.ok) {
                    showToast('Сервис добавлен', 'success');
                    closeAddServiceModal();
                    loadServices(false);
                } else {
                    const error = await response.json();
                    showToast(error.error || 'Ошибка добавления', 'error');
                }
            } catch (error) {
                showToast('Ошибка добавления сервиса', 'error');
            }
        }

        async function deleteService(id) {
            if (!confirm('Вы уверены, что хотите удалить этот сервис?')) return;

            try {
                const response = await fetch(basePath + `/api/services/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast('Сервис удалён', 'success');
                    loadServices(false);
                } else {
                    showToast('Ошибка удаления', 'error');
                }
            } catch (error) {
                showToast('Ошибка удаления сервиса', 'error');
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Expose functions to global scope for onclick handlers
        window.openAddModal = openAddModal;
        window.closeAddModal = closeAddModal;
        window.validateApiKey = validateApiKey;
        window.addAccount = addAccount;
        window.syncAllBalances = syncAllBalances;
        window.syncAccount = syncAccount;
        window.deleteAccount = deleteAccount;
        window.switchTab = switchTab;
        window.openAddServiceModal = openAddServiceModal;
        window.closeAddServiceModal = closeAddServiceModal;
        window.addService = addService;
        window.deleteService = deleteService;
        window.updatePeriod = updatePeriod;
        window.toggleHistoryGroup = toggleHistoryGroup;
    </script>
</body>
</html>
