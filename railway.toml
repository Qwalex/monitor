# https://docs.railway.app/deploy/config-as-code
# Добавьте в проект базу MongoDB и в Variables приложения задайте MONGODB_URI
# (или MONGO_URL) — строку подключения из карточки MongoDB или через Reference на сервис БД.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# При пустом BASE_PATH health лежит здесь; с BASE_PATH (например /monitor) укажите ${BASE_PATH}/api/health в панели Railway.
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
