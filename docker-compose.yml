version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: monitor-mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  monitor:
    image: ghcr.io/qwalex/monitor:latest
    container_name: monitor
    depends_on:
      - mongo
    ports:
      - "8083:3000"
    environment:
      - PORT=3000
      - BASE_PATH=/monitor
      - MONGODB_URI=mongodb://mongo:27017/monitor
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - VK_ACCESS_TOKEN=${VK_ACCESS_TOKEN}
      - VK_PEER_ID=${VK_PEER_ID}
      - VK_GROUP_ID=${VK_GROUP_ID}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/monitor/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongo_data:
